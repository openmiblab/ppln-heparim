name: heparim
channels:
  - pytorch
  - nvidia     # Keeping this here in case you install PyTorch/CUDA later
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  # Core data science/UI packages run best when managed by Conda natively:
  - numpy
  - pandas
  - matplotlib
  - tk         # This is the proper conda name for 'tkinter'

  - pip:
      - -e .
      - dbdicom
      - antspyx
      - dcmri
      - dicom2nifti
      - mdreg
      - napari[all]
      - pydicom
      - SimpleITK
      - totalsegmentator
      - tqdm
      - zarr