name: heparim
channels:
  - pytorch
  - nvidia  # Add this if you have an NVIDIA GPU
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  - pip:
      - -e .    # This installs the pipeline from source
      - dbdicom
      -ants
      -collections
      -concurrent.futures
      -dcmri
      -dicom2nifti
      -gc
      -glob
      -json
      -logging
      -matplotlib
      -mdreg
      -napari
      -numpy
      -os
      -pandas
      -pydicom
      -SimpleITK
      -sys
      -tempfile
      -tkinter
      -totalsegmentator
      -tqdm
      -zarr
      -zipfile